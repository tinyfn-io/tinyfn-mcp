name: Publish to MCP Registry

# Publishes server.json to the official MCP Registry (registry.modelcontextprotocol.io)
# under the io.tinyfn DNS namespace.
#
# Triggers on version tags (v*) so a release also publishes to the registry,
# plus a manual run. Bump the "version" field in server.json before tagging —
# the registry rejects re-publishing an existing version.
#
# Requires repo secret MCP_DNS_PRIVATE_KEY: the Ed25519 private key (hex) whose
# public key is in the tinyfn.io TXT record (v=MCPv1; k=ed25519; p=...).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Authenticate with the registry (DNS)
        env:
          MCP_DNS_PRIVATE_KEY: ${{ secrets.MCP_DNS_PRIVATE_KEY }}
        run: ./mcp-publisher login dns --domain tinyfn.io --private-key "$MCP_DNS_PRIVATE_KEY"

      - name: Publish server.json
        run: ./mcp-publisher publish
